<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Transaction Form')}"></head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container mt-4">
    <div class="col-md-8 col-lg-6 mx-auto">
        <form th:action="@{/portfolio-transactions/{id}/transaction/new/search(id=${portfolio.getId()})}"
              method="get">

            <div class="mb-2">
                <label class="col-4" for="exchange-selector">Choose Stock Exchange</label>
                <select id="exchange-selector" name="exchange">
                    <option th:each="exchange: ${exchanges}"
                            th:value="${exchange.code()}"
                            th:text="${exchange.displayName()}"
                    >
                    </option>
                </select>
            </div>
            <div class="mb-2">
                <label class="col-4" for="query">Search ticker, name or ISIN</label>
                <input id="query" name="query" type="text">
            </div>
            <button class="btn btn-primary btn-sm mb-2" type="submit">Search stocks or fonds</button>
            <div th:if="${searchError}" class="alert alert-danger" th:text="${searchError}"></div>
        </form>
        <div th:if="${tickerInfo}">
            <h5 class="alert alert-success">Choose ticker or fund form list:</h5>
            <ul class="list-group ps-0">
                <li th:each="ticker : ${tickerInfo}" class="d-grid align-items-center gap-2 mb-2"
                    style="grid-template-columns: 1fr 1fr 1fr auto;">

                    <span class="col-4 mb-2" th:text="${ticker.name()}">Name</span>
                    <span class="col-4 mb-2" th:text="${ticker.code()}">Code</span>
                    <span class="col-4 mb-2" th:text="${ticker.isin()}">ISIN</span>
                    <a class="btn btn-primary" th:href="@{/portfolio-transactions/{id}/transaction/new(
                id=${portfolio.getId()},
                code=${ticker.code()},
                isin=${ticker.isin()},
                exchange=${ticker.exchange()},
                name=${ticker.name()},
                currency=${ticker.currency()},
                instrumentType=${ticker.instrumentType()}
                )}">
                        Select
                    </a>
                </li>
            </ul>
            <br>
        </div>
        <div>
            <div  class="alert alert-success" th:if="${search}" th:text="${search}"></div>

            <form th:action="@{/portfolio-transactions/{id}/transactions(id=${portfolio.getId()})}"
                  th:object="${transactionForm}"
                  method="post">

                <div class="mb-2">
                    <label class="col-4" for="code">Ticker</label>
                    <input id="code" type="text" th:field="*{code}">
                </div>
                <div class="mb-2">
                    <label class="col-4" for="name">Name</label>
                    <input id="name" type="text" th:field="*{name}">
                </div>
                <div class="mb-2">
                    <label class="col-4" for="isin">ISIN</label>
                    <input id="isin" type="text" th:field="*{isin}">
                </div>
                <div class="mb-2">
                    <label class="col-4" for="exchange">Exchange</label>
                    <input id="exchange" type="text" th:field="*{exchange}">
                </div>
                <div class="mb-2">
                    <label class="col-4" for="amount">Amount</label>
                    <input id="amount" type="text" th:field="*{amount}">
                </div>
                <div class="mb-2">
                    <label class="col-4" for="price">Price</label>
                    <input id="price" type="text" th:field="*{price}">
                </div>
                <div>
                    <input type="hidden" th:field="*{currency}">
                </div>
                <div>
                    <input type="hidden" th:field="*{instrumentType}">
                </div>
                <div class="mb-2">
                    <label class="col-4" for="dateTime">Date and time</label>
                    <input id="dateTime"
                           type="datetime-local"
                           name="dateTime"
                           th:value="${#temporals.format(transactionForm.dateTime(), 'yyyy-MM-dd''T''HH:mm')}"
                           required>
                </div>
                <div class="mb-2">
                    <label class="col-4" for="transactionType">Type</label>
                    <input id="transactionType" type="text" th:field="*{transactionType}">
                </div>

                <button type="submit" class="btn btn-primary">Save transaction</button>

            </form>
        </div>
    </div>
</main>
</body>
</html>
