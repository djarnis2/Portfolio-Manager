<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Portfolio Detail')}"></head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mt-4">
    <div>
        <div sec:authorize="isAuthenticated()">
            <h2>
                Portfolio holdings for:
                <span th:text="${portfolio.name}"></span>
            </h2>

            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Average Price</th>
                    <th>Total Cost</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="stock : ${overview}">
                    <td th:text="${stock.companyName()}"></td>
                    <td th:text="${stock.totalAmount()}"></td>
                    <td th:text="${stock.averagePrice()}"></td>
                    <td th:text="${stock.totalCost()}"></td>
                </tr>
                </tbody>

            </table>

        </div>
    </div>
</main>
</body>
</html>
