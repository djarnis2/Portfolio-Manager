<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org" xmlns:sec="https://www.thymeleaf.org/extras/spring-security">
<head th:replace="~{fragments/head :: head('Portfolio Detail')}"></head>

<body>
<div th:replace="~{fragments/navbar :: navbar}"></div>
<main class="container mt-4">
    <div>
        <div sec:authorize="isAuthenticated()">
            <h2>
                Portfolio page:
                <span th:text="${portfolio.name}"></span>
            </h2>
            <br>
            <h4>Transactions:</h4>
            <table class="table table-striped">
                <thead>
                <tr>
                    <th>Name</th>
                    <th>Amount</th>
                    <th>Price</th>
                    <th>Total</th>
                </tr>
                </thead>

                <tbody>
                <tr th:each="tr : ${transactions}">
                    <td th:text="${tr.ticker}"></td>
                    <td th:text="${tr.amount}"></td>
                    <td th:text="${tr.price}"></td>
                    <td th:text="${tr.price * tr.amount} + ' ' + ${tr.currency}">0.00</td>
                </tr>
                </tbody>

            </table>

            <div>
                <a th:href="@{/portfolio/{id}/transaction/new(id=${portfolio.getId()})}">Add transaction</a>
            </div>
        </div>
    </div>
</main>
</body>
</html>
