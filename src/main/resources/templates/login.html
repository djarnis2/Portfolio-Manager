<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{fragments/head :: head('Login')}"></head>
<body>

<div th:replace="~{fragments/navbar :: navbar}"></div>

<main class="container mb-4">
    <div class="col-md-8 col-lg-6 mx-auto">
        <h1 class="mb-5">Login</h1>
        <div th:if=" ${registrationSuccess}" class="alert alert-success mb-2">
        Registration successful. You can now log in.
    </div>
    <form th:action="@{/login}" method="post">
        <div class="mb-2">
            <label class="col-4" for="username">Username</label>
            <input id="username" type="text" name="username" autocomplete="username">
        </div>
        <div class="mb-3">
            <label class="col-4" for="password">Password</label>
            <input id="password" type="password" name="password">
        </div>
        <button class="btn btn-primary" type="submit">Login</button>
        <p th:if="${param.error}">Wrong Username or Password</p>
    </form>
    </div>
</main>

</body>
</html>
