spring:
  application:
    name: portfolio-manager
  config:
    import: optional:file:.env[.properties]
  datasource:
    url: jdbc:mysql://mysql-docker:3306/portfolio-manager
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
stock:
  api:
    token: ${STOCK_API_TOKEN:}
    base-url: ${STOCK_API_BASE_URL:}
server:
  servlet:
    session:
      timeout: 2h